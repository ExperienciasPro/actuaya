# ====================================
# ActuaYa — Nginx Performance Config
# ====================================
# Este archivo se incluye desde la configuración principal de Nginx.
# Solo activa compresión gzip y cache headers para archivos estáticos.

# ─── Compresión Gzip ───────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1000;
gzip_types
    text/plain
    text/css
    text/javascript
    application/json
    application/javascript
    application/x-javascript
    application/xml
    application/xml+rss
    image/svg+xml
    font/woff2;

# ─── Cache de archivos estáticos ───────────────
# Angular genera hashes en los nombres de archivo,
# así que es seguro cachear agresivamente.
location ~* \.(js|css|woff2|woff|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

location ~* \.(png|jpg|jpeg|gif|webp|ico|svg)$ {
    expires 30d;
    add_header Cache-Control "public";
    access_log off;
}
